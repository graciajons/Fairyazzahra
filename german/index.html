/* Frame cinematic */
.video-frame {
  position: relative;
  width: 100%;
  height: 100vh;

}

/* Auto image all ratios */
.video-frame img {

.video-frame::after {

  font-size: 26px;
  margin-left: 3px;
}

/* Hover */
.video-frame:hover .play-button {
  background: rgba(0,0,0,0.6);
  transform: scale(1.05);
}

/* Click */
.video-frame:active .play-button {
  transform: scale(0.95);
}

/* Progress */
